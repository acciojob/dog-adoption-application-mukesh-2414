<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form action="" method="get">
		<label for="name">Name:</label>
	<input type="text" id="name" placeholder="Name" name="name">
		<br>

		<label for="phone">Phone Number:</label>
	<input type="text" id="phone" placeholder="Phone Number" name="phone">
		<br>

		<label for="address">Address:</label>
	<input type="text" id="address" placeholder="Address" name="address">
		<br>

		
	 <label for="dog">Have you ever lived with a Dog before?</label>
      <input type="checkbox" id="dog" name="dog"  />
      <br>
		
    <label for="breeds">Please select your preferred breeds:</label>
    <select id="breeds"  name="breeds" size="3" required>
      <option value="labrador">Lab</option>
      <option value="bulldog">Bull</option>
      <option value="beagle">pupy</option>
    </select>
		<br>
		
	<button type="submit">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
